name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "android/**"
      - ".github/workflows/build-apk.yml"
      - "assets/**"
      - "*.html"
      - "*.js"
      - "*.css"
      - "manifest.webmanifest"

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build installable APK
        run: gradle -p android --no-daemon assembleDebug

      - name: Prepare artifact
        run: cp android/app/build/outputs/apk/debug/app-debug.apk disordered-life-offline.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: disordered-life-offline-apk
          path: disordered-life-offline.apk
          if-no-files-found: error
          retention-days: 30
